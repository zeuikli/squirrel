name: pull request ci

# Fast style gate for PRs. The full build + DMG packaging (which needs the
# Onion data pipeline) lives in custom-dmg.yml — the fork's single build
# pipeline — so this workflow only runs SwiftLint.
on: [pull_request]

jobs:
  lint:
    runs-on: macos-26
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint
