name: custom dmg ci

# Builds the customized (voice + Onion 洋蔥) Squirrel and packages a
# distributable DMG (SPEC §17). Closes the three CI gaps that previously
# required local steps: Onion lexicon bundling, DMG assembly, and signing.
#
# Triggers:
#   - push a version tag X.Y.Z or X.Y.Z.W (e.g. 1.1.7) → attaches DMG to a draft release
#   - manual run (workflow_dispatch) → DMG uploaded as a build artifact
#
# Signing (see scripts/setup-signing.sh): if the repo defines the secret
# SIGNING_CERTIFICATE_P12_BASE64 (+ _PASSWORD, optional SIGN_IDENTITY_NAME),
# the stable self-signed identity is imported so users' TCC grants
# (Accessibility / Microphone) survive reinstalls. With no secret it falls
# back to ad-hoc signing — the DMG still installs (install.sh strips the
# quarantine attribute), but each build resets those grants.

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write   # required for the release-attach step to create/update a release
    env:
      # Match action-build.sh: universal binary + bundled octagram grammar.
      ARCHS: 'arm64 x86_64'
      BUILD_UNIVERSAL: '1'
      SQUIRREL_BUNDLED_RECIPES: 'lotem/rime-octagram-data lotem/rime-octagram-data@hant'
    steps:
      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.5'

      - name: Checkout Squirrel
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      # Quality gates folded in from the retired commit-ci/release-ci workflows.
      # SwiftLint runs first so style failures stop before the heavy clone/build.
      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: swiftlint

      # data/onion is committed (a tested Onion lexicon snapshot) for
      # reproducible builds — no longer regenerated from Onion_Rime_Files HEAD,
      # which had drifted and shipped broken schema data (SPEC §13.6).
      - name: Install build deps (librime, Sparkle, plum recipes)
        run: ./action-install.sh

      - name: Set up code signing
        env:
          CERT_B64: ${{ secrets.SIGNING_CERTIFICATE_P12_BASE64 }}
          CERT_PWD: ${{ secrets.SIGNING_CERTIFICATE_PASSWORD }}
          SIGN_IDENTITY_NAME: ${{ secrets.SIGN_IDENTITY_NAME }}
        run: |
          if [ -n "$CERT_B64" ]; then
            KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
            KPWD="$(openssl rand -hex 20)"
            CERT_PATH="$RUNNER_TEMP/identity.p12"
            echo "$CERT_B64" | base64 --decode > "$CERT_PATH"
            security create-keychain -p "$KPWD" "$KEYCHAIN"
            security set-keychain-settings -lut 21600 "$KEYCHAIN"
            security unlock-keychain -p "$KPWD" "$KEYCHAIN"
            security import "$CERT_PATH" -k "$KEYCHAIN" -P "$CERT_PWD" \
              -T /usr/bin/codesign -T /usr/bin/security
            # Allow codesign to use the private key without an interactive prompt.
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KPWD" "$KEYCHAIN" >/dev/null
            # Put our keychain first in the search list so codesign finds the identity.
            security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed s/\"//g)
            rm -f "$CERT_PATH"
            echo "SIGN_IDENTITY=${SIGN_IDENTITY_NAME:-Squirrel Dev Signing}" >> "$GITHUB_ENV"
            echo "Using imported stable signing identity."
          else
            echo "SIGN_IDENTITY=-" >> "$GITHUB_ENV"
            echo "No signing secret found — falling back to ad-hoc signing."
          fi

      - name: Build Squirrel (Release)
        run: make release SIGN_IDENTITY="$SIGN_IDENTITY"

      # Dead-code check (from the retired workflows). Advisory: reported in the
      # log but does not block packaging — flip continue-on-error to false to gate.
      - name: Install periphery
        run: brew install peripheryapp/periphery/periphery

      - name: Check Unused Code
        continue-on-error: true
        run: periphery scan --relative-results --skip-build --index-store-path build/Index.noindex/DataStore

      - name: Determine version
        id: ver
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            v="$GITHUB_REF_NAME"
          else
            v="$(git describe --always)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Assemble DMG
        run: scripts/make-dmg.sh "package/Squirrel-custom-${{ steps.ver.outputs.version }}.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v6
        with:
          name: Squirrel-custom-${{ steps.ver.outputs.version }}
          path: package/*.dmg
          retention-days: 90

      - name: Attach DMG to release
        if: ${{ github.ref_type == 'tag' }}
        uses: ncipollo/release-action@v1
        with:
          artifacts: "package/*.dmg"
          draft: true
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
